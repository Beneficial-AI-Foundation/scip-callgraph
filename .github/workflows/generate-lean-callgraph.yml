# Reusable workflow for generating call graphs from Lean 4 projects using probe-lean
#
# Usage in your Lean project (minimal):
#   jobs:
#     callgraph:
#       uses: Beneficial-AI-Foundation/scip-callgraph/.github/workflows/generate-lean-callgraph.yml@main
#
# With custom options:
#   jobs:
#     callgraph:
#       uses: Beneficial-AI-Foundation/scip-callgraph/.github/workflows/generate-lean-callgraph.yml@main
#       with:
#         project_path: 'MyLeanLib'
#         github_url: https://github.com/my-org/my-lean-project
#
name: Generate Lean Call Graph

on:
  workflow_call:
    inputs:
      project_path:
        description: 'Path to the Lean project (relative to repo root)'
        required: false
        default: '.'
        type: string
      github_url:
        description: 'GitHub repository URL for source code links (auto-detected if not provided)'
        required: false
        default: ''
        type: string
      github_path_prefix:
        description: 'Path prefix for source files in GitHub links'
        required: false
        default: ''
        type: string
      probe_lean_version:
        description: 'probe-lean git ref to use (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'
        type: string
      skip_verification:
        description: 'Skip verification step (only generate call graph without verification status)'
        required: false
        default: false
        type: boolean
      use_mathlib_cache:
        description: 'Run lake exe cache get before building (required for Mathlib-dependent projects)'
        required: false
        default: true
        type: boolean
      deploy_mode:
        description: 'Deployment mode: "subpath" (for existing sites) or "standalone" (full site)'
        required: false
        default: 'standalone'
        type: string
      subpath:
        description: 'Subpath for deployment (only used when deploy_mode is "subpath")'
        required: false
        default: 'callgraph'
        type: string

jobs:
  build:
    name: Build Lean Call Graph
    runs-on: ubuntu-latest

    outputs:
      artifact_name: callgraph-viewer

    steps:
      - name: Print workflow parameters
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  Lean Call Graph - Workflow Parameters"
          echo "═══════════════════════════════════════════════════════════"
          echo "  project_path:        ${{ inputs.project_path }}"
          echo "  github_url:          ${{ inputs.github_url || '(auto-detect)' }}"
          echo "  github_path_prefix:  ${{ inputs.github_path_prefix || '(none)' }}"
          echo "  probe_lean_version:  ${{ inputs.probe_lean_version }}"
          echo "  skip_verification:   ${{ inputs.skip_verification }}"
          echo "  use_mathlib_cache:   ${{ inputs.use_mathlib_cache }}"
          echo "  deploy_mode:         ${{ inputs.deploy_mode }}"
          echo "  subpath:             ${{ inputs.subpath }}"
          echo "═══════════════════════════════════════════════════════════"

      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          path: project
          submodules: recursive

      - name: Checkout scip-callgraph (for web viewer)
        uses: actions/checkout@v4
        with:
          repository: Beneficial-AI-Foundation/scip-callgraph
          path: scip-callgraph

      - name: Checkout probe-lean
        uses: actions/checkout@v4
        with:
          repository: Beneficial-AI-Foundation/probe-lean
          ref: ${{ inputs.probe_lean_version }}
          path: probe-lean

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Align probe-lean toolchain to target project
        run: |
          PROJECT_TC="project/${{ inputs.project_path }}/lean-toolchain"
          PROBE_TC="probe-lean/lean-toolchain"
          echo "Target project toolchain: $(cat "$PROJECT_TC")"
          echo "probe-lean toolchain:     $(cat "$PROBE_TC")"

          if ! diff -q "$PROJECT_TC" "$PROBE_TC" > /dev/null 2>&1; then
            echo "Toolchains differ — aligning probe-lean to target project..."
            cp "$PROJECT_TC" "$PROBE_TC"
            echo "Copied target lean-toolchain to probe-lean"

            cd probe-lean && lake update
            echo "✓ probe-lean dependencies updated for $(cat lean-toolchain)"
          else
            echo "✓ Toolchains already match"
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            probe-lean/.lake
            project/${{ inputs.project_path }}/.lake
          key: ${{ runner.os }}-lake-${{ hashFiles('probe-lean/lean-toolchain', 'project/**/lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      # Step 1: Build probe-lean
      - name: Build probe-lean
        working-directory: probe-lean
        run: |
          lake build probe-lean
          echo "✓ probe-lean built successfully"

      # Step 2: Download Mathlib cache (saves hours for Mathlib-dependent projects)
      - name: Download Mathlib cache
        if: inputs.use_mathlib_cache
        working-directory: project/${{ inputs.project_path }}
        run: |
          echo "Cleaning stale cache..."
          lake exe cache clean 2>&1 || true
          echo "Downloading Mathlib cache artifacts..."
          lake exe cache get 2>&1 || echo "⚠ cache get returned non-zero (may be partial)"
          echo "✓ Mathlib cache step complete"

      # Step 3: Build the target project (visible output for progress tracking)
      - name: Build target project
        working-directory: project/${{ inputs.project_path }}
        run: |
          echo "Building target project (output streams below)..."
          echo "═══════════════════════════════════════════════════════════"
          lake build 2>&1 | tee ${{ github.workspace }}/build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "═══════════════════════════════════════════════════════════"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "✗ Build failed with exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi
          echo "✓ Target project built successfully"
          SORRY_COUNT=$(grep -c "declaration uses 'sorry'" ${{ github.workspace }}/build_output.txt || true)
          echo "  sorry warnings detected: $SORRY_COUNT"

      # Step 4: Run probe-lean pipeline (atomize + specify + verify → enriched graph.json)
      - name: Generate enriched call graph
        working-directory: project/${{ inputs.project_path }}
        run: |
          FLAGS="--skip-build --from-file ${{ github.workspace }}/build_output.txt"
          if [ "${{ inputs.skip_verification }}" = "true" ]; then
            FLAGS="$FLAGS --skip-verify"
          fi
          echo "Running probe-lean pipeline (build already done, analyzing...)..."
          ${{ github.workspace }}/probe-lean/.lake/build/bin/probe-lean pipeline \
            --output ${{ github.workspace }}/scip-callgraph/web/public/graph.json \
            $FLAGS \
            .
          echo "✓ graph.json generated"
          echo "Atom count: $(python3 -c "import json; print(len(json.load(open('${{ github.workspace }}/scip-callgraph/web/public/graph.json'))))")"

      # Step 5: Build web viewer
      - name: Build web viewer
        working-directory: scip-callgraph/web
        env:
          VITE_GITHUB_URL: ${{ inputs.github_url || format('{0}/{1}', github.server_url, github.repository) }}
          VITE_GITHUB_PATH_PREFIX: ${{ inputs.github_path_prefix }}
        run: |
          npm ci

          if [ "${{ inputs.deploy_mode }}" = "subpath" ]; then
            echo "Building for subpath: /${{ inputs.subpath }}/"
            npx vite build --base=/${{ inputs.subpath }}/
          else
            REPO_NAME=$(echo "$VITE_GITHUB_URL" | sed 's|.*/||')
            echo "Building for standalone deployment: /${REPO_NAME}/"
            npx vite build --base=/${REPO_NAME}/
          fi

      # Step 6: Prepare artifact
      - name: Prepare deployment artifact
        run: |
          mkdir -p artifact
          cp -r scip-callgraph/web/dist/* artifact/
          cp scip-callgraph/web/public/graph.json artifact/

          echo "Artifact contents:"
          ls -la artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: callgraph-viewer
          path: artifact
          retention-days: 7

      - name: Upload Pages artifact (standalone mode)
        if: inputs.deploy_mode != 'subpath'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifact

  deploy-standalone:
    name: Deploy (Standalone)
    if: inputs.deploy_mode != 'subpath'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
